<!DOCTYPE html>
<html lang=pt-BR>
<head>
  <meta charset=UTF-8>
  <meta name=viewport content="width=device-width, initial-scale=1.0">
  <meta name=description content="Analise seu atendimento e descubra quanto dinheiro sua empresa pode recuperar com ajustes simples.">
  <title>Analise Rapida | Chamalead</title>
  <link rel=preload href=quiz.js as=script>
  <link rel=preload href=styles.css as=style>
  <style>:root{--bg-color:#09090b;--surface-color:rgb(255 255 255/.03);--surface-border:rgb(255 255 255/.08);--primary-color:#ff5100;--primary-glow:rgb(255 81 0/.3);--text-main:#fff;--text-muted:#a1a1aa;--error:#ef4444;--spring:cubic-bezier(.34,1.56,.64,1);--ease-out:cubic-bezier(.16,1,.3,1)}*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg-color);background-image:radial-gradient(circle at 50% -20%,rgb(255 81 0/.08)0%,transparent 50%),radial-gradient(circle at 50% 120%,rgb(255 81 0/.05)0%,transparent 40%);color:var(--text-main);display:flex;flex-direction:column;min-height:100dvh;overflow:hidden}#progress-container{width:100%;height:4px;background:rgb(255 255 255/.05);position:fixed;top:0;left:0;z-index:50;opacity:0;transition:opacity .3s}#progress-fill{height:100%;width:100%;transform:scaleX(var(--progress,0));transform-origin:left;will-change:transform;background:linear-gradient(90deg,#ff8a00,var(--primary-color));--progress:0;transition:transform .6s var(--spring);box-shadow:0 0 15px var(--primary-color);border-radius:0 2px 2px 0}header{padding:24px 24px 14px;display:flex;justify-content:space-between;align-items:center;z-index:10}.brand{font-weight:800;font-size:1.3rem;letter-spacing:-.05em;display:flex;align-items:center;gap:8px}.brand-icon{font-size:1.2rem;filter:drop-shadow(0 0 8px var(--primary-glow))}main{flex:1;display:flex;align-items:center;justify-content:center;padding:20px;position:relative}.quiz-container{width:100%;max-width:560px;display:grid;z-index:2;position:relative;min-height:min(68vh,620px)}.step{grid-area:1/1;opacity:0;pointer-events:none;visibility:hidden;transform:translateY(30px)scale(.95);transition:opacity .4s var(--ease-out),transform .6s var(--spring);display:flex;flex-direction:column;gap:24px;width:100%;position:absolute;inset:0;will-change:transform,opacity;contain:layout paint;content-visibility:auto}.step.active{opacity:1;pointer-events:auto;visibility:visible;transform:none;transition:opacity .5s var(--ease-out) .1s,transform .7s var(--spring) .1s}.step.exit-up{transform:translateY(-30px)scale(.95);opacity:0;visibility:hidden}h1,.step-title{font-size:1.8rem;font-weight:700;letter-spacing:-.04em;line-height:1.2}.micro-copy{font-size:.78rem;color:var(--primary-color);font-weight:700;text-transform:uppercase;letter-spacing:.1em}#mascot-wrapper{position:fixed;bottom:20px;right:20px;z-index:100;display:flex;align-items:flex-end;gap:12px;pointer-events:none}.mascot-body{width:56px;height:56px;border-radius:50%;background:linear-gradient(145deg,#1f1f22,#09090b);border:2px solid rgb(255 81 0/.4);box-shadow:0 0 15px rgb(255 81 0/.2),inset 0 0 10px rgb(255 255 255/.1);position:relative;display:flex;justify-content:center;align-items:center;animation:float 4s ease-in-out infinite;pointer-events:auto;cursor:pointer}.mascot-bubble{background:rgb(20 20 24/.85);backdrop-filter:blur(10px);border:1px solid var(--surface-border);border-radius:16px 16px 0 16px;padding:12px 16px;font-size:.9rem;font-weight:500;color:var(--text-main);box-shadow:0 10px 30px rgb(0 0 0/.5);max-width:220px;transform-origin:bottom right;transform:scale(0);opacity:0;transition:transform .4s var(--spring),opacity .3s}@media(max-width:640px){main{align-items:flex-start;padding:12px 16px 100px}.quiz-container{max-width:100%}.text-gradient{font-size:2.1rem}h1,.step-title{font-size:1.55rem}#mascot-wrapper{right:16px;bottom:16px}.mascot-bubble{max-width:180px}}</style>
  <link rel=stylesheet href=styles.css media=print onload="this.media='all'">
  <noscript><link rel=stylesheet href=styles.css></noscript>
</head>
<body>
  <a class=skip-link href=#quizContainer>Pular para o quiz</a>
  <div id=progress-container><div id=progress-fill></div></div>

  <header>
    <div class=brand><span class=brand-icon aria-label="Chamalead">🔥</span> Chamalead</div>
  </header>

  <main>
    <div class=quiz-container id=quizContainer role=group aria-label="Quiz de analise rapida"></div>
  </main>

  <div id=mascot-wrapper>
    <div class=mascot-bubble id=mascotBubble aria-live=polite>Oi. Eu sou o Ignis.</div>
    <button class=mascot-body id=mascotBody type=button aria-label="Mascote Ignis">
      <div class=mascot-face>
        <div class=mascot-eye></div>
        <div class=mascot-eye></div>
      </div>
    </button>
  </div>

  <script defer src=quiz.js></script>
</body>
</html>

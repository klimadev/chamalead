<!DOCTYPE html>
<html lang=pt-BR>
<head>
  <meta charset=UTF-8>
  <meta name=viewport content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name=description content="Analise seu atendimento e descubra quanto dinheiro sua empresa pode recuperar com ajustes simples.">
  <title>Analise Rapida | Chamalead</title>
  <link rel=preload href=styles.css as=style>
  <link rel=stylesheet href=styles.css>
</head>
<body>
  <a class=skip-link href=#quizContainer>Pular para o quiz</a>
  <div id=progress-container><div id=progress-fill></div></div>

  <header>
    <div class=brand><span class=brand-icon>🔥</span> Chamalead</div>
  </header>

  <main>
    <div class=quiz-container id=quizContainer></div>
  </main>

  <div id=mascot-wrapper>
    <div class=mascot-bubble id=mascotBubble aria-live=polite>Oi. Eu sou o Ignis.</div>
    <button class=mascot-body id=mascotBody type=button aria-label="Mascote Ignis">
      <div class=mascot-face>
        <div class=mascot-eye></div>
        <div class=mascot-eye></div>
      </div>
    </button>
  </div>

  <script defer src=quiz.js></script>
</body>
</html>

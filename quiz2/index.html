<!DOCTYPE html>
<html lang=pt-BR>
<head>
  <meta charset=UTF-8>
  <meta name=viewport content="width=device-width, initial-scale=1.0">
  <meta name=description content="Analise seu atendimento e descubra quanto dinheiro sua empresa pode recuperar com ajustes simples.">
  <link rel=icon href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ctext y='50' font-size='52'%3E%F0%9F%94%A5%3C/text%3E%3C/svg%3E">
  <title>Analise Rapida | Chamalead</title>
  <link rel=prefetch href="quiz.js?v=20260422l" as=script>
  <link rel=prefetch href="styles.css?v=20260422l" as=style>
  <noscript><link rel=stylesheet href="styles.css?v=20260422l"></noscript>
  <style>
    :root {
      --bg-color: #09090b;
      --surface-color: rgb(255 255 255 / .03);
      --surface-border: rgb(255 255 255 / .08);
      --primary-color: #ff5100;
      --primary-glow: rgb(255 81 0 / .3);
      --text-main: #fff;
      --text-muted: #a1a1aa;
      --spring: cubic-bezier(.34, 1.56, .64, 1);
      --ease-out: cubic-bezier(.16, 1, .3, 1);
      --motion-enter: cubic-bezier(.22, 1, .36, 1);
      --motion-exit: cubic-bezier(.4, 0, 1, 1);
      --motion-flow-duration: .4s;
      --motion-welcome-duration: .24s;
      --motion-result-duration: .52s;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #09090b;
      color: var(--text-main);
      display: flex;
      flex-direction: column;
      min-height: 100dvh;
      overflow-x: hidden;
      overflow-y: auto;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    body::-webkit-scrollbar {
      width: 0;
      height: 0;
    }

    body.style-ready {
      background-image: radial-gradient(circle at 50% -20%, rgb(255 81 0 / .08) 0%, transparent 50%), radial-gradient(circle at 50% 120%, rgb(255 81 0 / .05) 0%, transparent 40%);
      transition: background-color .32s var(--ease-out), background-image .42s var(--spring);
    }

    .skip-link {
      position: absolute;
      top: -40px;
      left: 0;
      background: #fff;
      color: #111;
      padding: 8px 12px;
      z-index: 100;
    }

    .skip-link:focus {
      top: 10px;
    }

    #progress-container {
      position: fixed;
      inset: 0 0 auto;
      z-index: 50;
      width: 100%;
      height: 4px;
      background: rgb(255 255 255 / .05);
      opacity: 0;
      transition: opacity .3s;
    }

    #progress-fill {
      height: 100%;
      width: 100%;
      background: linear-gradient(90deg, #ff8a00, var(--primary-color));
      transform: scaleX(var(--progress, 0));
      transform-origin: left;
      backface-visibility: hidden;
      will-change: transform;
      --progress: 0;
      transition: transform .36s var(--motion-enter);
      box-shadow: 0 0 12px rgb(255 81 0 / .22);
      border-radius: 0 2px 2px 0;
    }

    html[data-step-transition=welcome] #progress-fill {
      transition-duration: .42s;
    }

    html[data-step-transition=result] #progress-fill {
      transition-duration: .44s;
    }

    header {
      padding: 24px 24px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 10;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 1.3rem;
      font-weight: 800;
      letter-spacing: -.05em;
    }

    .brand-icon {
      font-size: 1.2rem;
      filter: drop-shadow(0 0 8px var(--primary-glow));
    }

    main {
      flex: 1;
      display: block;
      padding: 20px;
      position: relative;
    }

    .quiz-container {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 560px;
      margin: 0 auto;
    }

    .step {
      display: none;
      flex-direction: column;
      gap: 20px;
      width: 100%;
      padding: 12px 0 80px;
      transform-origin: 50% 50%;
      will-change: transform, opacity;
      backface-visibility: hidden;
      contain: layout paint;
    }

    .step.active {
      display: flex;
    }

    .step.step-enter-pending {
      visibility: hidden;
    }

    ::view-transition {
      pointer-events: none;
    }

    ::view-transition-group(quiz-step) {
      animation-duration: var(--motion-flow-duration);
      animation-timing-function: var(--motion-enter);
    }

    html[data-step-transition=welcome]::view-transition-group(quiz-step) {
      animation-duration: var(--motion-welcome-duration);
    }

    html[data-step-transition=result]::view-transition-group(quiz-step) {
      animation-duration: var(--motion-result-duration);
      animation-timing-function: cubic-bezier(.2, .9, .24, 1);
    }

    ::view-transition-old(quiz-step),
    ::view-transition-new(quiz-step) {
      mix-blend-mode: normal;
      height: 100%;
      transform-origin: 50% 50%;
    }

    ::view-transition-image-pair(quiz-step) {
      isolation: isolate;
    }

    ::view-transition-old(quiz-step) {
      animation: step-slide-out-left .36s cubic-bezier(.38, .04, .78, .08) both;
    }

    ::view-transition-new(quiz-step) {
      animation: none;
    }

    html[data-step-transition=welcome]::view-transition-old(quiz-step) {
      animation: step-slide-out-left .36s cubic-bezier(.38, .04, .78, .08) both;
    }

    html[data-step-transition=welcome]::view-transition-new(quiz-step) {
      animation: none;
    }

    html[data-step-transition=flow]::view-transition-old(quiz-step) {
      animation: step-slide-out-left .36s cubic-bezier(.38, .04, .78, .08) both;
    }

    html[data-step-transition=flow]::view-transition-new(quiz-step) {
      animation: none;
    }

    html[data-step-transition=result]::view-transition-old(quiz-step) {
      animation: result-stage-out .34s var(--motion-exit) both;
    }

    html[data-step-transition=result]::view-transition-new(quiz-step) {
      animation: result-stage-in var(--motion-result-duration) cubic-bezier(.2, .9, .24, 1) both;
    }

    .step-header {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .step#welcome {
      align-items: center;
    }

    .step#welcome .step-header {
      align-items: center;
      text-align: center;
    }

    .micro-copy {
      font-size: .78rem;
      color: var(--primary-color);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .1em;
    }

    .text-gradient {
      margin-bottom: 8px;
      color: var(--text-main);
      -webkit-text-fill-color: currentColor;
      font-size: 2.45rem;
      font-weight: 700;
      letter-spacing: -.04em;
      line-height: 1.08;
      text-align: center;
      text-wrap: balance;
      backface-visibility: hidden;
      transform: translateZ(0);
    }

    body.style-ready .text-gradient {
      background: linear-gradient(135deg, #fff 0%, #a1a1aa 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .text-highlight {
      color: var(--primary-color);
      -webkit-text-fill-color: var(--primary-color);
      text-shadow: 0 0 20px var(--primary-glow);
    }

    .subtitle {
      color: var(--text-muted);
      font-size: 1rem;
      line-height: 1.5;
      text-align: center;
    }

    .btn-primary {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      min-height: 52px;
      width: 100%;
      max-width: 320px;
      padding: 18px 24px;
      border: 0;
      border-radius: 12px;
      background: #fff;
      color: #09090b;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transform: translateZ(0);
      transition: transform .3s var(--spring), box-shadow .3s var(--ease-out), opacity .2s;
    }

    .btn-primary:active {
      transform: scale(.96);
    }

    .btn-primary:disabled {
      opacity: .72;
      cursor: progress;
    }

    .btn-primary:focus-visible,
    .mascot-body:focus-visible {
      box-shadow: 0 0 0 3px var(--primary-glow);
    }

    .btn-lava {
      background: var(--primary-color);
      color: #1b0a00;
      box-shadow: 0 8px 20px -6px var(--primary-color);
    }

    .step#welcome .micro-copy,
    .step#welcome .subtitle,
    .step#welcome .btn-primary {
      opacity: 0;
      animation: welcome-element-in .14s var(--motion-enter) forwards;
    }

    .step#welcome .text-gradient {
      opacity: 1;
      animation: welcome-title-settle .12s var(--motion-enter) both;
    }

    .step#welcome .btn-primary { animation-delay: .08s; }
    .step#welcome > .subtitle:last-of-type { animation-delay: .1s; }

    .mascot-bubble {
      background: rgb(20 20 24 / .85);
      backdrop-filter: blur(10px);
      border: 1px solid var(--surface-border);
      border-radius: 16px 16px 0 16px;
      padding: 12px 16px;
      font-size: .9rem;
      font-weight: 500;
      color: var(--text-main);
      box-shadow: 0 10px 30px rgb(0 0 0 / .5);
      width: 220px;
      min-width: 220px;
      transform-origin: bottom right;
      transform: scale(0);
      visibility: hidden;
      transition: transform .4s var(--spring), opacity .3s, visibility 0s .4s linear;
    }

    .mascot-bubble.show {
      transform: scale(1);
      opacity: 1;
      visibility: visible;
      transition: transform .4s var(--spring), opacity .3s, visibility 0s 0s linear;
    }

    .mascot-body {
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: auto;
      cursor: pointer;
      position: relative;
      width: 56px;
      height: 56px;
      border: 2px solid rgb(255 81 0 / .4);
      border-radius: 50%;
      background: linear-gradient(145deg, #1f1f22, #09090b);
      box-shadow: 0 0 15px rgb(255 81 0 / .2), inset 0 0 10px rgb(255 255 255 / .1);
      transition: transform .28s var(--spring), box-shadow .28s var(--ease-out), border-color .2s;
    }

    .mascot-face {
      display: flex;
      gap: 8px;
    }

    .mascot-eye {
      width: 8px;
      height: 16px;
      border-radius: 4px;
      background: var(--primary-color);
      box-shadow: 0 0 8px var(--primary-color);
    }

    #mascot-wrapper {
      position: fixed;
      right: 20px;
      bottom: 20px;
      z-index: 100;
      display: flex;
      align-items: flex-end;
      gap: 12px;
      pointer-events: none;
    }

    @keyframes welcome-stage-in {
      0% {
        opacity: .001;
        transform: translate3d(52px, 0, 0) scale(.99);
      }
      60% {
        opacity: 1;
        transform: translate3d(6px, 0, 0) scale(1);
      }
      100% {
        opacity: 1;
        transform: translate3d(0, 0, 0) scale(1);
      }
    }

    @keyframes result-stage-in {
      0% {
        opacity: .001;
        transform: translate3d(46px, 0, 0) scale(.992);
      }
      62% {
        opacity: 1;
        transform: translate3d(6px, 0, 0) scale(1);
      }
      100% {
        opacity: 1;
        transform: translate3d(0, 0, 0) scale(1);
      }
    }

    @keyframes result-stage-out {
      0% {
        opacity: 1;
        transform: translate3d(0, 0, 0) scale(1);
      }
      40% {
        opacity: .98;
        transform: translate3d(-10px, 0, 0) scale(.998);
      }
      100% {
        opacity: .001;
        transform: translate3d(-40px, 0, 0) scale(.992);
      }
    }

    @keyframes step-slide-out-left {
      0% {
        opacity: 1;
        transform: translate3d(0, 0, 0);
      }
      100% {
        opacity: 1;
        transform: translate3d(-88px, 0, 0);
      }
    }

    @keyframes welcome-element-in {
      0% {
        opacity: .001;
        transform: translate3d(8px, 0, 0);
      }
      60% {
        opacity: 1;
        transform: translate3d(1px, 0, 0);
      }
      100% {
        opacity: 1;
        transform: translate3d(0, 0, 0);
      }
    }

    @keyframes welcome-title-settle {
      0% {
        transform: translateX(4px);
      }
      60% {
        transform: translateX(1px);
      }
      100% {
        transform: translateX(0);
      }
    }

    @media (hover:hover) {
      .btn-primary:hover:not(:disabled) {
        transform: translateY(-2px) scale(1.01);
        box-shadow: 0 16px 28px -18px rgb(255 255 255 / .42);
      }

      .btn-lava:hover:not(:disabled) {
        box-shadow: 0 16px 24px -10px var(--primary-color), 0 0 0 1px rgb(255 255 255 / .08);
      }

      .mascot-body:hover {
        transform: translateY(-3px) scale(1.04);
        border-color: rgb(255 81 0 / .65);
        box-shadow: 0 0 18px rgb(255 81 0 / .28), 0 10px 24px rgb(0 0 0 / .3), inset 0 0 10px rgb(255 255 255 / .1);
      }
    }

    @media (max-width:640px) {
      #mascot-wrapper {
        right: 16px;
        bottom: 16px;
      }

      .mascot-bubble {
        max-width: 180px;
      }
    }

    @media (max-height:700px), (max-width:640px) {
      body {
        background-image: none;
      }

      header {
        padding: 14px 16px 8px;
      }

      main {
        padding: 12px 16px 72px;
      }

      .step {
        gap: 14px;
        padding: 8px 0 60px;
      }

      .text-gradient {
        background: none;
        -webkit-background-clip: initial;
        -webkit-text-fill-color: currentColor;
        color: var(--text-main);
        font-size: 1.7rem;
      }

      .text-highlight {
        text-shadow: none;
      }

      .btn-primary {
        min-height: 44px;
        padding: 14px 18px;
      }

      .subtitle {
        font-size: .9rem;
      }

      .brand {
        font-size: 1.1rem;
      }
    }
  </style>
</head>
<body>
  <a class=skip-link href=#quizContainer>Pular para o quiz</a>
  <div id=progress-container><div id=progress-fill></div></div>

  <header>
    <div class=brand><span class=brand-icon aria-label="Chamalead">🔥</span> Chamalead</div>
  </header>

  <main>
    <div class=quiz-container id=quizContainer role=group aria-label="Quiz de analise rapida">
      <section class="step active" id=welcome aria-live=polite>
        <div class=step-header>
          <span class=micro-copy>Analise rapida</span>
          <h1 class=text-gradient>Sua empresa pode estar <span class=text-highlight>perdendo dinheiro</span> sem perceber.</h1>
          <p class=subtitle>Responda algumas perguntas rapidas e veja onde podem estar os principais problemas no seu atendimento, nas vendas e no contato com os clientes.</p>
        </div>
        <button class="btn-primary btn-lava" id=welcomeCta type=button>Comecar agora</button>
        <p class=subtitle>Leva menos de 2 minutos.</p>
      </section>
    </div>
  </main>

  <div id=mascot-wrapper>
    <div class=mascot-bubble id=mascotBubble aria-live=polite>Oi. Eu sou o Ignis.</div>
    <button class=mascot-body id=mascotBody type=button aria-label="Mascote Ignis">
      <div class=mascot-face>
        <div class=mascot-eye></div>
        <div class=mascot-eye></div>
      </div>
    </button>
  </div>

  <script defer src="boot.js?v=20260422l"></script>
</body>
</html>
